<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; }
        .result { margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>登录功能测试</h1>
    
    <div class="test-section">
        <h2>1. 测试localStorage读写</h2>
        <button onclick="testLocalStorage()">测试LocalStorage</button>
        <div id="localStorageResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试注册功能</h2>
        <input type="text" id="regUsername" placeholder="用户名">
        <input type="password" id="regPassword" placeholder="密码">
        <button onclick="testRegister()">注册</button>
        <div id="registerResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试登录功能</h2>
        <input type="text" id="loginUsername" placeholder="用户名">
        <input type="password" id="loginPassword" placeholder="密码">
        <button onclick="testLogin()">登录</button>
        <div id="loginResult" class="result"></div>
    </div>

    <script>
        function testLocalStorage() {
            const resultDiv = document.getElementById('localStorageResult');
            resultDiv.innerHTML = '';

            try {
                // 测试写入
                const testData = { message: '测试数据' };
                localStorage.setItem('testKey', JSON.stringify(testData));
                resultDiv.innerHTML += '<p>写入成功: ' + JSON.stringify(testData) + '</p>';

                // 测试读取
                const storedData = localStorage.getItem('testKey');
                resultDiv.innerHTML += '<p>读取成功: ' + storedData + '</p>';

                // 测试users数组
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                resultDiv.innerHTML += '<p>当前users: ' + JSON.stringify(users) + '</p>';

                // 测试currentUser
                const currentUser = localStorage.getItem('currentUser');
                resultDiv.innerHTML += '<p>当前currentUser: ' + currentUser + '</p>';

            } catch (error) {
                resultDiv.innerHTML += '<p style="color: red;">错误: ' + error.message + '</p>';
            }
        }

        function testRegister() {
            const resultDiv = document.getElementById('registerResult');
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            resultDiv.innerHTML = '';

            try {
                // 模拟注册逻辑
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const existingUser = users.find(u => u.username === username);
                
                if (existingUser) {
                    resultDiv.innerHTML = '<p style="color: red;">用户名已存在</p>';
                    return;
                }
                
                // 创建新用户
                const newUser = {
                    id: Date.now().toString(),
                    username: username,
                    password: password
                };
                
                // 保存用户到本地存储
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                // 自动登录新用户
                localStorage.setItem('currentUser', JSON.stringify({ id: newUser.id, username: newUser.username }));
                
                resultDiv.innerHTML = '<p style="color: green;">注册成功: ' + JSON.stringify(newUser) + '</p>';
                resultDiv.innerHTML += '<p>users数组: ' + JSON.stringify(users) + '</p>';
                resultDiv.innerHTML += '<p>currentUser: ' + localStorage.getItem('currentUser') + '</p>';
            } catch (error) {
                resultDiv.innerHTML += '<p style="color: red;">错误: ' + error.message + '</p>';
            }
        }

        function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            resultDiv.innerHTML = '';

            try {
                // 模拟登录逻辑
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    // 保存用户信息到本地存储
                    localStorage.setItem('currentUser', JSON.stringify({ id: user.id, username: user.username }));
                    
                    resultDiv.innerHTML = '<p style="color: green;">登录成功: ' + JSON.stringify(user) + '</p>';
                    resultDiv.innerHTML += '<p>currentUser: ' + localStorage.getItem('currentUser') + '</p>';
                } else {
                    resultDiv.innerHTML = '<p style="color: red;">用户名或密码错误</p>';
                    resultDiv.innerHTML += '<p>users数组: ' + JSON.stringify(users) + '</p>';
                }
            } catch (error) {
                resultDiv.innerHTML += '<p style="color: red;">错误: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
